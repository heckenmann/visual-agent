name: Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  NO_AT_BRIDGE: "1"
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  test:
    name: Gradle tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: on-success
          cache-overwrite-existing: true
          validate-wrappers: false

      - name: Restore configuration cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/configuration-cache
          key: gradle-config-cache-${{ runner.os }}-gradle-9.6.1-${{ hashFiles('build.gradle.kts', 'settings.gradle.kts', 'gradle.properties') }}

      - name: Run tests
        run: xvfb-run -a gradle test --build-cache --no-daemon
