name: Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Gradle tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.3.0"

      - name: Run tests
        run: gradle test
