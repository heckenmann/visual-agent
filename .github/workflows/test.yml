name: Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  NO_AT_BRIDGE: "1"

jobs:
  test:
    name: Gradle tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.6.0 --no-daemon

      - name: Run tests
        run: xvfb-run -a ./gradlew --no-daemon test
